name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Client: install deps + Vite build ────────────────────────────────────────
  client-build:
    name: Client — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build
        env:
          # Placeholder so Vite doesn't warn about missing VITE_API_URL
          VITE_API_URL: https://placeholder.onrender.com/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # ── Server: install deps + syntax check all JS files ─────────────────────────
  server-check:
    name: Server — Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all server JS files
        run: find . -name "*.js" ! -path "./node_modules/*" | xargs node --check

  # ── Summary badge (only on main) ─────────────────────────────────────────────
  ci-pass:
    name: CI passed
    needs: [client-build, server-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.client-build.result }}" == "success" && "${{ needs.server-check.result }}" == "success" ]]; then
            echo "✓ CI passed"
          else
            echo "✗ CI failed — client=${{ needs.client-build.result }} server=${{ needs.server-check.result }}"
            exit 1
          fi
